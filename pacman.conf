[options]
HoldPkg = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

[bakery-os]
SigLevel = Never
Server = https://repo.bakeryos.smtdfc.space/$arch

[custom]
SigLevel = Optional TrustAll
Server = file:///home/smtdfc/Projects/BakeryOSProject/bakeryos/data/local-repo

[core]
Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch

[extra]
Server = https://mirrors.kernel.org/archlinux/$repo/os/$arch
